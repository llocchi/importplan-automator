services:
  - type: web
    name: catalog-import-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: FRONTEND_ORIGIN
        value: https://llocchi.github.io